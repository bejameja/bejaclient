name: Release Launcher

# Triggered by pushing a version tag matching the version in package.json.
# Example: git tag v1.0.9 && git push origin v1.0.9

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $pkgVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tagVersion -ne $pkgVersion) {
            Write-Error "Tag ${{ github.ref_name }} does not match package.json version $pkgVersion — update package.json before tagging."
            exit 1
          }
          Write-Host "Version check OK: $pkgVersion"

      - name: Ensure beja-libs directory exists
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "resources\beja-libs" | Out-Null

      - name: Build and publish (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version check OK: $PKG_VERSION"

      - name: Ensure beja-libs directory exists
        run: mkdir -p resources/beja-libs

      - name: Build and publish (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux
