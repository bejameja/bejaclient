name: Release BejaClient JAR

# How to use:
#   1. Build your JAR locally:  cd BejaClient-MC && ./gradlew assembleDist
#   2. Copy it to  client-jars/beja-bootstrap-X.Y.Z.jar  and commit+push
#   3. Go to Actions → "Release BejaClient JAR" → Run workflow → enter version
#
# The workflow will:
#   - Create a pre-release tagged  client-vX.Y.Z  with the JAR attached
#   - Compute SHA256 for download integrity verification
#   - Update client-version.json on main so the launcher auto-downloads it

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.0) — must match the JAR filename'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate bootstrap JAR
        id: jar
        run: |
          VERSION="${{ inputs.version }}"
          NAME="beja-bootstrap-${VERSION}.jar"
          # Check staging dir first, then bundled resources
          for p in "client-jars/${NAME}" "resources/beja-libs/${NAME}"; do
            if [ -f "$p" ]; then
              echo "path=$p"    >> "$GITHUB_OUTPUT"
              echo "name=${NAME}" >> "$GITHUB_OUTPUT"
              echo "✅ Found JAR at $p"
              exit 0
            fi
          done
          echo "❌ JAR not found. Commit beja-bootstrap-${VERSION}.jar to client-jars/ first."
          exit 1

      - name: Compute SHA256
        id: sha
        run: |
          HASH=$(sha256sum "${{ steps.jar.outputs.path }}" | cut -d' ' -f1)
          echo "bootstrap=${HASH}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${HASH}"

      - name: Create GitHub release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: client-v${{ inputs.version }}
          name: "BejaClient Client ${{ inputs.version }}"
          prerelease: true
          body: |
            ## BejaClient ${{ inputs.version }}

            The launcher auto-downloads this update on the next launch when using a BejaClient profile.

            **Bootstrap JAR:** `${{ steps.jar.outputs.name }}`
            **SHA256:** `${{ steps.sha.outputs.bootstrap }}`
          files: ${{ steps.jar.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update client-version.json
        run: |
          VERSION="${{ inputs.version }}"
          NAME="${{ steps.jar.outputs.name }}"
          SHA256="${{ steps.sha.outputs.bootstrap }}"
          URL="https://github.com/${{ github.repository }}/releases/download/client-v${VERSION}/${NAME}"
          jq -n \
            --arg version  "$VERSION"   \
            --arg url      "$URL"       \
            --arg filename "$NAME"      \
            --arg sha256   "$SHA256"    \
            --arg date     "$(date -u +%Y-%m-%d)" \
            '{version:$version, url:$url, filename:$filename, sha256:$sha256, releaseDate:$date}' \
            > client-version.json
          echo "Updated client-version.json:"
          cat client-version.json

      - name: Commit updated client-version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client-version.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump client to v${{ inputs.version }}"
          git push
