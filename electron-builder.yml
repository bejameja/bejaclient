appId: com.bejaclient.launcher
productName: BejaClient
copyright: Copyright © 2024 BejaClient

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*

icon: resources/icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: true
  perMachine: false
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BejaClient

mac:
  target: dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  icon: resources/icon.png

publish:
  provider: github
  owner: bejameja
  repo: bejaclient
